<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход аккаунт</title>
    <link rel="stylesheet" href="static/account.css">
</head>
<body>
    <div class="info">
        <a href="" type="button"><strong>О проекте</strong></a>
    </div>
    <div class="get_in">
        <h1><strong>Вход</strong></h1>
        <form action="/login/" method="post">
            <div class="email">
                <p><strong>Email</strong></p>
                <input type="email" name="email" required>
            </div>
            <div class="password">
                <p><strong>Пароль</strong></p>
                <input type="password" name="password" required>
            </div>
            <div class="button_get_in">
                <button type="submit">Войти</button>
            </div>
            <div class="unremember">
                <a href="" type="button">Забыли пароль ?</a>
            </div>
        </form>
    </div>
    <div class="registration">
        Ещё нет аккаунта ? <a href="" type="button">Зарегистрируйтесь</a>
    </div>
</body>
</html>
